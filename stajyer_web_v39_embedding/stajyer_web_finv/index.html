function App(){
  const root=el(`<div class="min-h-screen"></div>`);
  if(!state.token){ root.appendChild(AuthLanding()); return root; }
  root.appendChild(Topbar());
  if(state.spreadsheetId && !state.loading) root.appendChild(EvalHistoryPanel());

  if(state.loading){
    root.appendChild(el(`<div class="max-w-4xl mx-auto px-6 py-10 text-slate-600">Yükleniyor...</div>`));
    return root;
  }

  if(!state.spreadsheetId){
    root.appendChild(SelectDatasetPage());
  }else{
    let page=null;
    if(state.route==="#dashboard" && state.canSeeDashboard) page=DashboardPage();
    else if(state.route==="#review" && !state.canSeeHR) page=ReviewPage();
    else if(state.route==="#select") page=SelectDatasetPage();
    else page = state.canSeeDashboard ? DashboardPage() : ReviewPage();
    root.appendChild(page);
  }

  if(state.toast){
    const t=state.toast;
    const bg = t.kind==="error" ? "bg-rose-600" : (t.kind==="warn"?"bg-amber-500":"bg-emerald-600");
    root.appendChild(el(`<div class="fixed bottom-4 left-1/2 -translate-x-1/2 ${bg} text-white px-4 py-3 rounded-2xl shadow-lg z-50">${escapeHtml(t.msg)}</div>`));
  }

  if(state.modal?.type==="trainee"){
    root.appendChild(TraineeModal());
    setTimeout(()=>{
      const host=document.getElementById("chartHost");
      if(!host) return;
      const series=buildSeriesForTrainee(state.modal.tid);
      host.innerHTML = buildChartSvg(series);
    }, 40);
  }
  if(state.modal?.type==="review"){
    root.appendChild(ReviewModal());
  }
  if(state.modal?.type==="hr"){
    root.appendChild(HrModal());
  }
  if(state.modal?.type==="formSyncPreview"){
    root.appendChild(FormSyncPreviewModal());
  }

  return root;
}




function _cssEscape(s){
  s = String(s||"");
  try{ if(window.CSS && CSS.escape) return CSS.escape(s); }catch(e){}
  // fallback: escape quotes/backslashes
  return s.replace(/\\/g,"\\\\").replace(/"/g,'\\"');
}
function captureUiSnapshot(){
  const snap = { open: [] };
  try{
    const d = document.querySelector('details[data-donem-box]');
    if(d && d.open) snap.open.push("donem");
    document.querySelectorAll('details[data-mfbox]').forEach(x=>{
      if(x.open) snap.open.push("mf:"+String(x.dataset.mfbox||""));
    });
  }catch(e){}
  return snap;
}
function restoreUiSnapshot(snap){
  if(!snap) return;
  try{
    (snap.open||[]).forEach(k=>{
      if(k==="donem"){
        const d = document.querySelector('details[data-donem-box]');
        if(d) d.open = true;
      }else if(k.startsWith("mf:")){
        const id = k.slice(3);
        const d = document.querySelector('details[data-mfbox="'+_cssEscape(id)+'"]');
        if(d) d.open = true;
      }
    });
  }catch(e){}
}

function render(){
  const app=document.getElementById("app");
  if(!app) return;
  const snap = captureUiSnapshot();
  app.innerHTML="";
  app.appendChild(App());
  wire();
  wireFilters();
  updateEvalHistoryHost();
  restoreUiSnapshot(snap);
}

function openTraineeModal(tid){ state.modal={type:"trainee", tid}; render(); }
function canReviewTrainee(tid){
  if(state.canSeeDashboard || state.canSeeAllReviews) return true;
  const allowed = new Set(traineesAssignedToCurrentUser().map(t=>String(t.StajyerID||"")));
  return allowed.has(String(tid));
}
function openReviewModal(tid){
  if(state.canSeeHR){
    setToast("İK rolü yorum yapamaz.", "warn");
    return;
  }
  if(!canReviewTrainee(tid)){
    setToast("Bu stajyer sana atanmadı. Yorum yapamazsın.", "warn");
    return;
  }
  state.reviewSaving=false;
  state.revErrors=null;


  const selDate = String(state.reviewDate||"").trim();
  const perm = reviewPermission(state.role, selDate);
  if(!perm.allowed){
    setToast(perm.reason || "Önce izinli bir tarih seçmelisin.", "warn");
    return;
  }

  state.modal={type:"review", tid}; render();
}


function openHrModal(tid){
  if(!state.canManageHR){
    setToast("Bu işlem sadece İK / Süpervizör / Admin içindir.", "warn");
    return;
  }
  state.modal={type:"hr", tid}; render();
}

function closeModal(){
  state.reviewSaving=false;
  state.modal=null; render();
}

function wireFilters(){
  // Legacy single-select support (if any remains)
  document.querySelectorAll('select[data-f]').forEach(sel=>{
    const key=sel.getAttribute('data-f');
    if(key==="donem"){ sel.disabled=true; return; }
    sel.onchange=()=>{
      state.filters = state.filters || {};
      state.filters[key]=sel.value;
      render();
    };
  });

  // Multi-select checkboxes (new)
  document.querySelectorAll('input[type="checkbox"][data-mf][data-mv]').forEach(cb=>{
    const key = cb.dataset.mf;
    const val = cb.dataset.mv;

    cb.onchange = ()=>{
      state.filters = state.filters || {};
      let arr = normFilterArray(state.filters[key]);

      if(val === "__ALL__"){
        arr = [];
      }else{
        if(cb.checked){
          if(!arr.includes(val)) arr.push(val);
        }else{
          arr = arr.filter(x=>x!==val);
        }
      }

      state.filters[key] = arr;
      render();
    };
  });

  const clr=document.getElementById("clearFilters");
  if(clr) clr.onclick=()=>{
    state.filters = { sehir:[], egitim:[], basvuru:[], durum:[], hostel:[], grup:[] };
    render();
  };
}

function wire(){
  // data-action buttons (delegated)
  document.querySelectorAll("[data-action]").forEach(btn=>{
    btn.addEventListener("click", async (ev)=>{
      ev.preventDefault();
      ev.stopPropagation();
      const act = btn.dataset.action;
      const tid = btn.dataset.tid || btn.getAttribute("data-tid") || "";
      try{
        if(act==="login") return login();
        if(act==="logout") return logout();
        if(act==="changeDataset"){
          localStorage.removeItem("active_dataset");
          state.spreadsheetId=null; state.datasetName=null; state.tables={}; state.sheetMap=null;
          routeTo("#select");
          setToast("Dataset seçimine dönüldü.", "ok");
          return;
        }
        if(act==="loadDriveList") return await loadDriveList();
        if(act==="clearQ"){ state.q=""; render(); return; }
        if(act==="syncFormData"){ await previewFormSync(); return; }
        if(act==="confirmFormSync"){ await syncFormToTrainees(); return; }
        if(act==="openTrainee"){ openTraineeModal(tid); return; }
        if(act==="openReview"){ openReviewModal(tid); return; }
        if(act==="openHR"){ openHrModal(tid); return; }
        if(act==="closeModal"){ closeModal(); return; }
        if(act==="saveHR"){
          if(!state.canManageHR) { setToast("Bu işlem sadece İK / Süpervizör / Admin içindir.", "warn"); return; }
          const dep=document.querySelector('[data-bind="hr_dep"]')?.value?.trim();
          const durum=document.querySelector('[data-bind="hr_status"]')?.value?.trim();
          if(!dep || !durum){ setToast("Departman ve durum seçmelisin.", "warn"); return; }
          if(!getActiveDonemIds().length){ setToast("Önce dönem seçiniz.", "warn"); return; }
          try{
            const tr=(state.tables[state.sheetMap?.trainees || SHEETS.trainees]?.rows||[]).find(x=>String(x.StajyerID||"")===String(state.modal.tid))||{};
            await appendHrEntry(state.modal.tid, tr.AdıSoyadı||"", dep, durum);
            await refreshHr();
            setToast("Kaydedildi ✅", "ok");
            state.modal={type:"hr", tid: state.modal.tid};
            render();
            return;
          }catch(err){ throw err; }
        }
        if(act==="saveReview"){
          if(state.reviewSaving) return;

          const vEl=document.querySelector('[data-bind="rev_v"]');
          const iEl=document.querySelector('[data-bind="rev_i"]');
          const eEl=document.querySelector('[data-bind="rev_e"]');
          const noteEl=document.querySelector('[data-bind="rev_note"]');

          const v=(vEl?.value||"").trim();
          const i=(iEl?.value||"").trim();
          const e=(eEl?.value||"").trim();
          const note=(noteEl?.value||"").trim();
          const proj=(document.querySelector('[data-bind="rev_project"]')?.value||"").trim();
          const selDate = String(state.reviewDate||"").trim();
          if(!selDate){
            setToast("Yorum tarihi seçmelisin.", "warn");
            return;
          }
          const perm0 = reviewPermission(state.role, selDate);
          if(!perm0.allowed){
            render();
            setToast(perm0.reason || "Bu tarihte yorum yapamazsın.", "warn");
            return;
          }

          if(!getActiveDonemIds().length){
            setToast("Önce dönem seçiniz.", "warn");
            return;
          }



          const isStrict = ["UZMAN","PROJE_UZMANI","HOSTEL_UZMANI","SUPERVISOR"].includes(state.role);
const att = (document.querySelector('input[name="rev_att"]:checked')?.value||"").trim();
          const hostel = (document.querySelector('input[name="rev_hostel"]:checked')?.value||"").trim();
          const katilimOrHostel = (state.role==="HOSTEL_UZMANI") ? hostel : att;

          const ex = myEvalForTraineeDate(state.modal.tid, selDate) || {};
          const ctxLabels = criteriaLabelsForContext(state.role, selDate);
          const l1 = String(ex.Kriter1_Baslik || ctxLabels[0] || "Kriter 1");
          const l2 = String(ex.Kriter2_Baslik || ctxLabels[1] || "Kriter 2");
          const l3 = String(ex.Kriter3_Baslik || ctxLabels[2] || "Kriter 3");

// reset previous errors on every save attempt
          state.revErrors = null;

          const errors = {};
          const parseScore=(raw, el, key, label)=>{
            const s=String(raw||"").trim();
            if(!s){ errors[key]=label+" puanı zorunlu."; return ""; }
            const n=Number(s.replace(",", "."));
            if(!Number.isFinite(n) || !Number.isInteger(n)){ errors[key]=label+" 1-5 arası tam sayı olmalı."; return ""; }
            if(n<1 || n>5){
              errors[key]=label+" 1-5 arası olmalı. (Girilen: "+s+")";
              return "";
            }
            return n;
          };

          const parseOptionalScore=(raw, el, key, label)=>{
            const s=String(raw||"").trim();
            if(!s) return "";
            const n=Number(s.replace(",", "."));
            if(!Number.isFinite(n) || !Number.isInteger(n) || n<1 || n>5){
              errors[key]=label+" 1-5 arası tam sayı olmalı. (Girilen: "+s+")";
              return "";
            }
            return n;
          };
          const payload = { verim:"", ilgi:"", egitmen:"", yorum:note, katilimDurumu: katilimOrHostel, tarih: selDate, label1:l1, label2:l2, label3:l3 };

          if(isStrict){
            payload.verim = parseScore(v, vEl, "verim", l1);
            payload.ilgi = parseScore(i, iEl, "ilgi", l2);
            payload.egitmen = parseScore(e, eEl, "egitmen", l3);            if(state.role==="UZMAN" || state.role==="PROJE_UZMANI"){
              if(!att) errors.att = "Katılım durumu seçmelisin (Katıldı / Katılmadı).";
            }
            if(state.role==="HOSTEL_UZMANI"){
              if(!hostel) errors.hostel = "Hostel seçmelisin (San Art / Charlie).";
            }
if(!note) errors.yorum = "Yorum zorunlu.";

            if(Object.keys(errors).length){
              state.revErrors = errors;
              render();

              // focus first invalid control
              if(errors.att){
                // no focusable element; just scroll into view
                document.querySelector('input[name="rev_att"]')?.scrollIntoView?.({block:"center"});
              }else if(errors.hostel){
                document.querySelector('input[name="rev_hostel"]')?.scrollIntoView?.({block:"center"});
              }else if(errors.verim){ vEl?.focus(); }
              else if(errors.ilgi){ iEl?.focus(); }
              else if(errors.egitmen){ eEl?.focus(); }
              else if(errors.yorum){ noteEl?.focus(); }

              setToast("Eksik/Geçersiz alanlar var. Düzeltip tekrar Kaydet.", "warn");
              return;
            }
          }else{
            payload.verim = parseOptionalScore(v, vEl, "verim", l1);
            payload.ilgi = parseOptionalScore(i, iEl, "ilgi", l2);
            payload.egitmen = parseOptionalScore(e, eEl, "egitmen", l3);

            if(Object.keys(errors).length){
              state.revErrors = errors;
              render();
              if(errors.verim){ vEl?.focus(); }
              else if(errors.ilgi){ iEl?.focus(); }
              else if(errors.egitmen){ eEl?.focus(); }
              setToast("Puanlar 1-5 arası tam sayı olmalı. Düzeltip tekrar Kaydet.", "warn");
              return;
            }
          }

          const hasAnyEval = isStrict ? true : (payload.verim!=="" || payload.ilgi!=="" || payload.egitmen!=="" || note!=="");

          // project topic change (only Proje Uzmanı)
          const tRow = (state.tables[state.sheetMap?.trainees || SHEETS.trainees]?.rows||[]).find(x=>String(x.StajyerID||"")===String(state.modal.tid))||{};
          const oldProj = String(tRow.ProjeKonusu||"").trim();
          const projChanged = (state.role==="PROJE_UZMANI") && (proj.trim()!==oldProj);

          if(!hasAnyEval && !projChanged){
            setToast("Boş işlem kaydedilemez.", "warn");
            return;
          }

          state.reviewSaving = true;
          render();

          try{
            // Update Proje Konusu first (if changed)
            if(projChanged){
              await updateTraineeField(state.modal.tid, "ProjeKonusu", proj.trim());
              // Refresh trainee table in UI
              await loadAllTables();
            }

            if(hasAnyEval){
              await upsertMyEvaluation(state.modal.tid, { ...payload });
              await loadAllTables();
              updateEvalHistoryHost();

              // Groq AI puanlama — arka planda, UI'yi bloklamaz
              const _evalRow = myEvalForTraineeDate(state.modal.tid, selDate);
              console.log("[Groq DEBUG] _evalRow=", _evalRow, "note=", note, "selDate=", selDate);
              if(_evalRow && note){
                console.log("[Groq DEBUG] Calling groqBackgroundScore with rowIndex=", _evalRow.__rowIndex);
                groqBackgroundScore(
                  state.modal.tid, note,
                  payload.verim, payload.ilgi, payload.egitmen,
                  _evalRow.__rowIndex
                ).catch((err)=>{ console.warn("[Groq DEBUG] groqBackgroundScore threw:", err); });
              } else {
                console.warn("[Groq DEBUG] Skipped — _evalRow:", !!_evalRow, "note:", !!note);
              }

              // Auto advance only when an evaluation/comment is saved
              const q=(state.q||"").toLowerCase();
              const base = state.canSeeDashboard ? traineeRowsForActiveDonem() : traineesAssignedToCurrentUser();
              const ids = base.filter(t=>{
                if(!q) return true;
                return String(t.AdıSoyadı||"").toLowerCase().includes(q) || String(t.StajyerID||"").toLowerCase().includes(q);
              }).map(t=>String(t.StajyerID||""));

              let next = null;
              const cur = String(state.modal.tid||"");
              if(ids.length){
                const idx = Math.max(0, ids.indexOf(cur));
                const rotated = ids.slice(idx+1).concat(ids.slice(0, idx+1));
                next = rotated.find(id=>!isDone(id)) || rotated[0];
                if(next===cur && ids.length===1) next = null;
              }

              state.reviewSaving = false;
              state.toast = {msg:"Kaydedildi ✅", kind:"ok", ts:Date.now()};
              setTimeout(()=>{ if(state.toast && Date.now()-state.toast.ts>2600){ state.toast=null; if(!state.modal) render(); }},2800);

              if(next){
                state.modal = {type:"review", tid: next};
                render();
              }else{
                state.modal = null;
                render();
              }
              return;
            }

            // Only Proje Konusu changed (no eval) → save & close for Proje Uzmanı
            state.reviewSaving = false;
            setToast("Kaydedildi ✅", "ok");
            closeModal();
            return;
          }catch(err){
            state.reviewSaving = false;
            render();
            throw err;
          }
        }
      }catch(err){
        console.error(err);
        setToast(err.message||"İşlem hatası","error");
      }
    });
  });


  // topbar period multi-select
  document.querySelectorAll("[data-donemcb]").forEach(cb=>{
    const did = String(cb.dataset.did||"").trim();
    cb.onchange = ()=>{
      const all = allDonemIds();
      let sel = getActiveDonemIds();

      if(did==="__ALL__"){
        sel = cb.checked ? all.slice() : [];
      }else{
        if(cb.checked){
          if(!sel.includes(did)) sel = sel.concat([did]);
        }else{
          sel = sel.filter(x=>x!==did);
        }
      }

      state.donemTouched = true;
      setActiveDonemIds(sel);
      render();
    };
  });

  // binds
  document.querySelectorAll("[data-bind]").forEach(inp=>{
    const key=inp.dataset.bind;

    inp.addEventListener("input", ()=>{
      if(key==="q"){
        state.q=inp.value;
        if(_qDebounce) clearTimeout(_qDebounce);
        _qDebounce = setTimeout(()=>{
          render();
          const focused = document.querySelector('[data-bind="q"]');
          if(focused){ focused.focus(); const len=focused.value.length; focused.setSelectionRange(len,len); }
        }, 80);
        return;
      }
});

    inp.addEventListener("change", ()=>{
      if(key==="donem"){ setActiveDonemIds([inp.value]); render(); return; }
      if(key==="review_date"){
        const raw = String(inp.value||"").trim();
        state.reviewDateRaw = raw;
        if(!raw){
          state.reviewDate = "";
          localStorage.removeItem("review_date");
          localStorage.removeItem("review_date_raw");
          const hid = document.getElementById("reviewDateHidden");
          if(hid) hid.value = "";
          render();
          return;
        }
        const iso = toIsoDate(raw);
        if(!iso){
          state.reviewDate = "";
          localStorage.removeItem("review_date");
          localStorage.setItem("review_date_raw", raw);
          render();
          return;
        }
        state.reviewDate = iso;
        state.reviewDateRaw = iso;
        inp.value = iso;
        localStorage.setItem("review_date", iso);
        localStorage.setItem("review_date_raw", iso);
        const hid = document.getElementById("reviewDateHidden");
        if(hid) hid.value = iso;
        render();
        return;
      }
    });
  });

    // hidden review date picker sync
  const hidPicker = document.getElementById("reviewDateHidden");
  if(hidPicker){
    hidPicker.addEventListener("change", ()=>{
      const v = String(hidPicker.value||"").trim();
      state.reviewDate = v;
      state.reviewDateRaw = v;
      if(v){
        localStorage.setItem("review_date", v);
        localStorage.setItem("review_date_raw", v);
      }else{
        localStorage.removeItem("review_date");
        localStorage.removeItem("review_date_raw");
      }
      const vis = document.querySelector('[data-bind="review_date"]');
      if(vis) vis.value = v;
      render();
    });
  }

// drive list render
  const driveHost=document.getElementById("driveListHost");
  if(driveHost) renderDriveList(driveHost);

  // overlay click close
  const overlay=document.querySelector(".overlay");
  if(overlay){
    overlay.addEventListener("click",(e)=>{
      if(e.target===overlay){ if(state.reviewSaving) return; closeModal(); }
    });
  }
}

  render();
  // bootAfterLogin is triggered from initGsi() when GSI is ready (and token exists)
})();
</script>
